name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          cp scripts/bootstrap.sh _site/bootstrap.sh
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <meta http-equiv="refresh" content="0;url=https://github.com/kzahel/chromeos-testbed">
          <a href="https://github.com/kzahel/chromeos-testbed">chromeos-testbed on GitHub</a>
          EOF

      - uses: actions/upload-pages-artifact@v3

      - id: deployment
        uses: actions/deploy-pages@v4
